<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>С 8 марта, мама! 💐</title>
    <style>
        /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* скрываем стандартный курсор */
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9eef7; /* нежный базовый фон */
        }

        body {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== КАСТОМНЫЙ КУРСОР-КРУЖОК ===== */
        .cursor {
            position: fixed;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffb6c1, #ff69b4);
            box-shadow: 0 0 20px #ff9eb5;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.3s;
            mix-blend-mode: screen;
            animation: cursorGlow 3s infinite alternate;
        }

        @keyframes cursorGlow {
            0% { background: radial-gradient(circle at 30% 30%, #ffb6c1, #ff69b4); box-shadow: 0 0 20px #ff9eb5; }
            25% { background: radial-gradient(circle at 30% 30%, #fbc2eb, #a6c1ee); box-shadow: 0 0 25px #f0a6ca; }
            50% { background: radial-gradient(circle at 30% 30%, #ffdde1, #ee9ca7); box-shadow: 0 0 30px #ffb3b3; }
            75% { background: radial-gradient(circle at 30% 30%, #d4fc79, #96e6a1); box-shadow: 0 0 25px #b4e7b4; }
            100% { background: radial-gradient(circle at 30% 30%, #f6d5f7, #fbe9d7); box-shadow: 0 0 35px #ffc0cb; }
        }

        /* ===== ФОНОВЫЕ СЛОИ ДЛЯ ПАРАЛЛАКСА ===== */
        .parallax-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            will-change: transform;
        }

        .layer1 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path fill="%23ff9ebb" d="M20,40 Q30,20 40,40 T60,40 T80,40 Q90,20 100,40 L100,100 L0,100 Z"/><circle fill="%23ffb7c5" cx="15" cy="70" r="8"/><circle fill="%23f9c7d3" cx="85" cy="30" r="12"/><circle fill="%23ffa5b9" cx="50" cy="15" r="6"/></svg>');
            background-size: 300px 300px;
            opacity: 0.3;
        }

        .layer2 {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="%23fda7b7" opacity="0.15"><path d="M30,120 Q50,90 70,120 L70,200 L30,200 Z"/><circle cx="150" cy="80" r="15"/><circle cx="40" cy="30" r="20"/></svg>');
            background-size: 400px 400px;
            opacity: 0.2;
        }

        .layer3 {
            background: radial-gradient(circle at 30% 40%, rgba(255,200,220,0.3) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(200,220,255,0.25) 0%, transparent 50%);
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 100%;
            text-align: center;
            color: #4a2e3b;
            padding: 20px 0;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(255, 105, 180, 0.3);
            animation: fadeInDown 1.2s ease-out;
        }

        .subtitle {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            margin-bottom: 40px;
            opacity: 0.9;
            animation: fadeInUp 1.2s 0.2s both;
        }

        /* карточка */
        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            border: 1px solid rgba(255, 255, 255, 0.7);
            transform-style: preserve-3d;
            transition: box-shadow 0.4s, transform 0.2s;
            animation: scaleIn 1s 0.4s both;
        }

        .card h3 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 500;
            color: #b34180;
            letter-spacing: 1px;
        }

        .card p {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #5e3a4c;
        }

        .card button {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #4a2e3b;
            box-shadow: 0 10px 25px -5px rgba(255, 120, 160, 0.5);
            cursor: none;
            transition: transform 0.3s, box-shadow 0.3s, filter 0.3s;
            border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            letter-spacing: 0.5px;
        }

        .card button:hover {
            transform: scale(1.08) translateY(-5px);
            box-shadow: 0 25px 35px -8px rgba(255, 80, 140, 0.6);
            filter: brightness(1.05);
        }

        /* сюрприз (скрыт по умолчанию) */
        .surprise {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            border: 1px solid white;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: opacity 0.5s, transform 0.5s;
            pointer-events: none;
        }

        .surprise.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .surprise p {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .surprise .flowers {
            font-size: 3rem;
            line-height: 1.4;
            animation: bounce 2s infinite;
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ===== АДАПТАЦИЯ ПОД ТЕЛЕФОН ===== */
        @media (max-width: 600px) {
            body {
                cursor: auto; /* на телефоне показываем обычный курсор */
                padding: 15px;
            }
            .cursor {
                display: none; /* убираем кастомный */
            }
            * {
                cursor: auto;
            }
            .card {
                padding: 30px 20px;
            }
            .card button {
                cursor: pointer;
                padding: 12px 35px;
                font-size: 1.2rem;
            }
            h1 {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
        }

        /* дополнительно для очень маленьких */
        @media (max-width: 380px) {
            h1 { font-size: 2rem; }
            .card h3 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Фон с параллакс слоями -->
    <div class="parallax-bg" id="parallaxBg">
        <div class="layer layer1" id="layer1"></div>
        <div class="layer layer2" id="layer2"></div>
        <div class="layer layer3" id="layer3"></div>
    </div>

    <!-- Кастомный курсор (виден только на десктопе) -->
    <div class="cursor" id="customCursor"></div>

    <!-- Основное содержимое -->
    <div class="content">
        <h1>🌷 С 8 марта, любимая мама! 🌷</h1>
        <p class="subtitle">Спасибо тебе за любовь, поддержку и понимание</p>

        <div class="card" id="card">
            <h3>💐 Маме 💐</h3>
            <p>Пусть каждый день будет полон улыбок и твоей красотой!</p>
            <button id="surpriseBtn">✨ Открой Сюрприз ✨</button>
            <div class="surprise" id="surpriseBlock">
                <p>🌸 Весна пришла — и это твой праздник! 🌸</p>
                <div class="flowers">🌺🌼🌷🌻🌹</div>
                <p>Ты самая прекрасная!</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== НАСТРОЙКИ ==========
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) return; // на мобильных отключаем скрипты параллакса и курсора (чтобы не лагало)

            // ========== КАСТОМНЫЙ КУРСОР ==========
            const cursor = document.getElementById('customCursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            // ========== ПАРАЛЛАКС ФОНА ==========
            const layer1 = document.getElementById('layer1');
            const layer2 = document.getElementById('layer2');
            const layer3 = document.getElementById('layer3');
            
            let mouseX = 0, mouseY = 0;
            let targetX = 0, targetY = 0;
            const speed = 0.05; // плавность

            document.addEventListener('mousemove', (e) => {
                // координаты в процентах относительно центра экрана (-50 до 50)
                mouseX = (e.clientX / window.innerWidth - 0.5) * 2; // от -1 до 1
                mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
            });

            function updateParallax() {
                // плавно стремимся к целевым значениям
                targetX += (mouseX - targetX) * speed;
                targetY += (mouseY - targetY) * speed;

                // смещаем слои с разной интенсивностью
                if (layer1) {
                    layer1.style.transform = `translate(${targetX * 20}px, ${targetY * 20}px)`;
                }
                if (layer2) {
                    layer2.style.transform = `translate(${targetX * 40}px, ${targetY * 30}px)`;
                }
                if (layer3) {
                    layer3.style.transform = `translate(${targetX * 10}px, ${targetY * 10}px)`;
                }
                requestAnimationFrame(updateParallax);
            }
            updateParallax();

            // ========== ПАРАЛЛАКС НАВЕДЕНИЯ НА КАРТОЧКУ (3D-эффект) ==========
            const card = document.getElementById('card');
            if (card) {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const cardCenterX = rect.left + rect.width / 2;
                    const cardCenterY = rect.top + rect.height / 2;
                    const deltaX = e.clientX - cardCenterX;
                    const deltaY = e.clientY - cardCenterY;
                    
                    // максимальный угол наклона 8 градусов
                    const rotateY = (deltaX / (rect.width / 2)) * 8;
                    const rotateX = -(deltaY / (rect.height / 2)) * 8;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
                    card.style.transition = 'transform 0.1s';
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
                    card.style.transition = 'transform 0.5s';
                });
            }

            // ========== КНОПКА СЮРПРИЗ ==========
            const surpriseBtn = document.getElementById('surpriseBtn');
            const surpriseBlock = document.getElementById('surpriseBlock');
            if (surpriseBtn && surpriseBlock) {
                surpriseBtn.addEventListener('click', () => {
                    surpriseBlock.classList.toggle('show');
                    // маленький эффект для кнопки
                    surpriseBtn.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        surpriseBtn.style.transform = '';
                    }, 200);
                });
            }

            // ========== ДОПОЛНИТЕЛЬНО: ПЛАВНОЕ ПОЯВЛЕНИЕ ЭЛЕМЕНТОВ ==========
            // уже через CSS, но можно добавить эффект при загрузке
        })();
    </script>

    <!-- Подстраховка: если мобильный, то показываем стандартный курсор и всё работает без js параллакса -->
    <noscript>
        <style>
            .cursor { display: none; }
            * { cursor: auto; }
        </style>
    </noscript>
</body>
</html>
